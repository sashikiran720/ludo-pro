<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Multiplayer Ludo Pro</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');

        :root {
            --red: #E53935;
            --green: #43A047;
            --yellow: #FDD835;
            --blue: #1E88E5;
            --bg: #0f172a;
            --panel: #1e293b;
            --text: #f8fafc;
        }

        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow-x: hidden;
            user-select: none;
        }

        /* Lobby Styles */
        #lobby {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            padding: 20px;
            box-sizing: border-box;
        }

        .lobby-box {
            background: #ffffff;
            color: #1e293b;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            text-align: center;
            width: 100%;
            max-width: 420px;
        }

        .lobby-box h1 { margin-top: 0; font-size: 32px; color: var(--blue); font-weight: 800; text-transform: uppercase; letter-spacing: 2px;}
        .lobby-box p { color: #64748b; margin-bottom: 20px; font-weight: 600; }
        
        .color-selector {
            display: flex; justify-content: space-around; margin: 10px 0 25px;
        }
        
        .color-opt {
            width: 50px; height: 50px; border-radius: 50%; cursor: pointer;
            border: 4px solid transparent; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        .color-opt.selected {
            border-color: #1e293b;
            box-shadow: 0 0 15px rgba(0,0,0,0.4);
            transform: scale(1.15);
        }

        .lobby-select, .lobby-box input[type="text"] {
            width: 100%; padding: 16px; margin-bottom: 20px; border: 2px solid #e2e8f0;
            border-radius: 12px; font-size: 16px; box-sizing: border-box; text-align: center;
            background: #f8fafc; cursor: pointer; font-family: inherit; font-weight: 600;
            transition: all 0.3s ease; color: #333;
        }
        
        .lobby-select:focus, .lobby-box input[type="text"]:focus { outline: none; border-color: var(--blue); }
        
        .lobby-btn {
            display: block; width: 100%; background: var(--blue); color: white; border: none;
            padding: 16px; font-size: 18px; border-radius: 12px; margin-bottom: 15px; cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s; font-weight: 800; text-transform: uppercase;
        }
        .lobby-btn.create { background: var(--green); }
        .lobby-btn:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        .lobby-btn:active { transform: translateY(0); }

        /* Game App Styles */
        #app {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 15px;
            gap: 25px;
            box-sizing: border-box;
        }

        /* Player Cards */
        .players-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: min(95vw, 380px);
        }

        .player-card {
            background: var(--panel);
            padding: 12px;
            border-radius: 15px;
            text-align: center;
            border: 3px solid transparent;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            position: relative;
        }

        .player-card.active { transform: scale(1.03); }
        .player-card[data-player="0"].active { border-color: var(--red); box-shadow: 0 0 20px rgba(229, 57, 53, 0.4); }
        .player-card[data-player="1"].active { border-color: var(--green); box-shadow: 0 0 20px rgba(67, 160, 71, 0.4); }
        .player-card[data-player="2"].active { border-color: var(--yellow); box-shadow: 0 0 20px rgba(253, 216, 53, 0.4); }
        .player-card[data-player="3"].active { border-color: var(--blue); box-shadow: 0 0 20px rgba(30, 136, 229, 0.4); }

        .player-name { font-weight: 800; font-size: 16px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .player-score { font-size: 12px; color: #38bdf8; font-weight: 800; margin: 4px 0; }
        .player-status { font-size: 12px; color: #94a3b8; font-weight: 600;}

        /* Board Styles */
        #board-wrapper {
            position: relative;
            width: min(95vw, 550px);
            height: min(95vw, 550px);
            background: #fff;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            border-radius: 15px;
            border: 4px solid #334155;
            padding: 8px;
            box-sizing: border-box;
        }

        #board-container {
            position: relative;
            width: 100%; height: 100%;
            background: #fff; border-radius: 8px;
            overflow: hidden; border: 2px solid #1e293b;
        }

        #board {
            display: grid;
            grid-template-columns: repeat(15, 1fr);
            grid-template-rows: repeat(15, 1fr);
            width: 100%; height: 100%;
        }

        .cell {
            border: 1px solid rgba(0,0,0,0.1);
            box-sizing: border-box; position: relative; display: flex;
            justify-content: center; align-items: center;
            font-size: min(4vw, 20px); color: rgba(255,255,255,0.9);
        }

        .center-triangle {
            position: absolute; left: 40%; top: 40%; width: 20%; height: 20%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 100 100' preserveAspectRatio='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpolygon points='0,0 100,0 50,50' fill='%2343A047'/%3E%3Cpolygon points='100,0 100,100 50,50' fill='%23FDD835'/%3E%3Cpolygon points='0,100 100,100 50,50' fill='%231E88E5'/%3E%3Cpolygon points='0,0 0,100 50,50' fill='%23E53935'/%3E%3C/svg%3E");
            z-index: 1; box-shadow: inset 0 0 10px rgba(0,0,0,0.4);
        }
        .safe-star { color: #cbd5e1; font-size: 1.2em; text-shadow: 0 1px 2px rgba(0,0,0,0.3); }

        /* Tokens */
        #tokens-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 5;
        }

        .token {
            position: absolute;
            width: calc(100% / 15 * 0.75); height: calc(100% / 15 * 0.75);
            border-radius: 50%; border: 2px solid rgba(255,255,255,0.95);
            box-shadow: inset 0 3px 5px rgba(255,255,255,0.6), inset 0 -4px 5px rgba(0,0,0,0.3), 0 4px 8px rgba(0,0,0,0.5);
            pointer-events: auto; cursor: pointer;
            transition: left 0.25s cubic-bezier(0.34, 1.56, 0.64, 1), top 0.25s cubic-bezier(0.34, 1.56, 0.64, 1), transform 0.2s ease;
            transform-origin: center; z-index: 10;
        }
        .token::after {
            content: ''; position: absolute; top: 15%; left: 15%; width: 70%; height: 70%;
            border-radius: 50%; border: 3px solid rgba(255,255,255,0.5); box-sizing: border-box;
        }
        .token.highlight {
            animation: bounce 0.8s infinite alternate;
            box-shadow: inset 0 3px 5px rgba(255,255,255,0.6), inset 0 -4px 5px rgba(0,0,0,0.3), 0 0 15px 5px #fff;
            z-index: 20;
        }
        @keyframes bounce { 0% { transform: translate(-50%, -50%) scale(1); } 100% { transform: translate(-50%, -75%) scale(1.15); } }

        /* UI Panel */
        #ui-panel {
            width: min(95vw, 380px); background: var(--panel); padding: 20px;
            border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            text-align: center; box-sizing: border-box; border: 1px solid #334155;
        }

        #room-info { font-size: 14px; color: #94a3b8; margin-bottom: 10px; font-weight: 600;}
        .share-btn { background: #10b981; padding: 6px 12px; border-radius: 8px; color: white; border: none; font-weight: bold; cursor: pointer; margin-left: 10px;}

        #timer-display {
            font-size: 20px; font-weight: 800; color: #f8fafc;
            background: rgba(0,0,0,0.4); border-radius: 12px; padding: 5px 20px;
            display: none; margin-bottom: 10px; min-width: 100px;
        }

        #msg-box {
            height: 28px; font-weight: 800; color: #f8fafc; margin-bottom: 10px; font-size: 16px;
            padding: 5px; border-radius: 8px; background: rgba(0,0,0,0.2);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }

        .dice-container { perspective: 1000px; margin: 15px auto; width: 75px; height: 75px; }
        .dice {
            width: 100%; height: 100%; background: #fff; border-radius: 15px;
            box-shadow: inset 0 -5px 10px rgba(0,0,0,0.2), 0 10px 20px rgba(0,0,0,0.4);
            display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(3, 1fr);
            padding: 10px; box-sizing: border-box; cursor: pointer; transition: transform 0.1s; border: 4px solid #333;
        }
        .dice:active { transform: scale(0.95); }
        .dice.rolling { animation: dice-roll-anim 0.4s infinite linear; pointer-events: none; }
        .dot { background: #333; border-radius: 50%; width: 14px; height: 14px; margin: auto; box-shadow: inset 0 2px 4px rgba(0,0,0,0.5); }
        .dot.hidden { opacity: 0; }
        @keyframes dice-roll-anim { 0% { transform: scale(1) rotate(0deg); } 25% { transform: scale(1.2) rotate(90deg); } 50% { transform: scale(1.2) rotate(180deg); } 75% { transform: scale(1.2) rotate(270deg); } 100% { transform: scale(1) rotate(360deg); } }

        .roll-btn {
            background: var(--blue); color: #fff; border: none; padding: 18px;
            font-size: 20px; border-radius: 12px; cursor: pointer; width: 100%;
            font-weight: 800; box-shadow: 0 5px 15px rgba(0,0,0,0.3); margin-top: 5px;
            text-transform: uppercase; transition: all 0.3s;
        }
        .roll-btn:active:not(:disabled) { transform: translateY(3px); box-shadow: none; }
        .roll-btn:disabled { background: #475569; color: #94a3b8; cursor: not-allowed; box-shadow: none; }

        /* Chat Panel */
        #chat-panel {
            width: min(95vw, 380px); background: var(--panel); padding: 15px;
            border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); border: 1px solid #334155;
            display: flex; flex-direction: column; height: 350px; box-sizing: border-box;
        }
        #chat-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
        #chat-messages {
            flex-grow: 1; overflow-y: auto; margin-bottom: 10px; padding-right: 5px;
            display: flex; flex-direction: column; gap: 8px; font-size: 14px; text-align: left;
        }
        .chat-msg { background: rgba(0,0,0,0.2); padding: 8px 12px; border-radius: 12px; word-wrap: break-word; transition: background 1.5s; }
        @keyframes highlight-msg { 0% { background: rgba(255,255,255,0.4); } 100% { background: rgba(0,0,0,0.2); } }
        .chat-msg.new-msg { animation: highlight-msg 1.5s ease-out; }
        .chat-sender { font-weight: 800; font-size: 12px; margin-bottom: 4px; }
        
        #emoji-bar { display: flex; justify-content: space-around; margin-bottom: 10px; background: rgba(0,0,0,0.3); padding: 10px; border-radius: 10px; }
        .emoji { cursor: pointer; font-size: 24px; transition: transform 0.2s; padding: 0 5px; }
        .emoji:hover { transform: scale(1.3); }

        #chat-input-area { display: flex; gap: 8px; }
        #chat-input {
            flex-grow: 1; padding: 12px; border-radius: 10px; border: none;
            background: #fff; color: #333; font-family: inherit; outline: none; font-weight: 600; font-size: 14px;
        }
        #chat-send-btn { background: var(--blue); color: white; border: none; padding: 0 20px; border-radius: 10px; cursor: pointer; font-weight: bold; }

        /* Admin Dashboard */
        .admin-toggle { background: none; border: none; color: #94a3b8; text-decoration: underline; cursor: pointer; font-size: 12px; margin-top: 15px; font-weight: 600; }
        #admin-dashboard { margin-top: 15px; padding: 15px; background: rgba(0,0,0,0.3); border-radius: 12px; display: none; border: 1px dashed #475569; }
        .admin-btn { background: #E53935; color: white; border: none; padding: 8px 12px; border-radius: 6px; margin: 4px; font-weight: bold; cursor: pointer; font-size: 12px;}
        .admin-btn:hover { opacity: 0.9; }
        
        #admin-dice-panel { display: none; margin-top: 10px; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 8px; }
        .admin-dice-btn { background: #1e293b; border: 2px solid #38bdf8; color: #fff; border-radius: 6px; padding: 8px 15px; cursor: pointer; font-weight: bold; margin: 3px; font-size:16px;}
        .admin-dice-btn:hover { background: #38bdf8; color: #1e293b; }

        /* Toast Message */
        #toast {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: #10b981; color: #fff; padding: 12px 25px; font-size: 16px;
            border-radius: 30px; z-index: 1000; display: none; font-weight: 800;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5); text-transform: uppercase;
        }
        @keyframes fadein { from { top: -20px; opacity: 0; } to { top: 20px; opacity: 1; } }
        @keyframes fadeout { from { top: 20px; opacity: 1; } to { top: -20px; opacity: 0; } }

        /* Modals */
        .modal {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(15, 23, 42, 0.9); display: none; justify-content: center; align-items: center;
            z-index: 100; backdrop-filter: blur(5px);
        }
        .modal-content {
            background: #ffffff; padding: 40px; border-radius: 20px; text-align: center;
            max-width: 350px; width: 90%; box-shadow: 0 20px 50px rgba(0,0,0,0.5); color: #1e293b;
        }
        .modal-content h2 { margin-top: 0; font-size: 32px; font-weight: 800; text-transform: uppercase; margin-bottom: 20px;}
        .confetti { position: absolute; width: 10px; height: 10px; background-color: #f00; animation: fall 3s linear infinite; z-index: 101;}
        @keyframes fall { to { transform: translateY(100vh) rotate(720deg); } }
    </style>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
</head>
<body>

    <div id="lobby">
        <div class="lobby-box">
            <h1>Ludo Pro</h1>
            <p>Real-Time Multiplayer Experience</p>

            <input type="text" id="player-name" placeholder="Enter Your Name" maxlength="15">

            <label style="display:block; text-align:left; font-weight:bold; margin-bottom:8px; color:#475569;">Select Your Color:</label>
            <div class="color-selector" id="color-selector">
                <div class="color-opt selected" data-color="0" style="background:#E53935"></div>
                <div class="color-opt" data-color="1" style="background:#43A047"></div>
                <div class="color-opt" data-color="2" style="background:#FDD835"></div>
                <div class="color-opt" data-color="3" style="background:#1E88E5"></div>
            </div>
            
            <label style="display:block; text-align:left; font-weight:bold; margin-bottom:8px; color:#475569;">Select Mode:</label>
            <select id="player-count" class="lobby-select">
                <option value="1">1 Player (vs Robot)</option>
                <option value="2">2 Players</option>
                <option value="3">3 Players</option>
                <option value="4" selected>4 Players</option>
            </select>

            <label style="display:block; text-align:left; font-weight:bold; margin-bottom:8px; color:#475569;">Turn Time:</label>
            <select id="turn-time" class="lobby-select">
                <option value="20">20 Seconds</option>
                <option value="30" selected>30 Seconds</option>
            </select>
            
            <button class="lobby-btn create" onclick="createRoom()">Create Room</button>
            <div style="margin: 20px 0; font-weight: bold; color: #94a3b8;">— OR —</div>
            <input type="text" id="room-input" placeholder="Enter Room ID">
            <button class="lobby-btn" onclick="joinRoom()">Join Room</button>
        </div>
    </div>

    <div id="app" style="display: none;">
        <div class="players-container" id="players-container"></div>

        <div id="board-wrapper">
            <div id="board-container">
                <div id="board"></div>
                <div class="center-triangle"></div>
                <div id="tokens-container"></div>
            </div>
        </div>

        <div id="ui-panel">
            <div id="room-info">
                Room: <span id="display-room-id" style="color:#38bdf8; font-size:16px;"></span>
                <button class="share-btn" onclick="shareRoom()">Share</button>
            </div>
            
            <div id="timer-display">Time left: --s</div>
            <div id="msg-box">Waiting to start...</div>
            
            <div class="dice-container">
                <div id="dice" class="dice" onclick="performUserRoll()">
                    <div class="dot hidden"></div><div class="dot hidden"></div><div class="dot hidden"></div>
                    <div class="dot hidden"></div><div class="dot hidden"></div><div class="dot hidden"></div>
                    <div class="dot hidden"></div><div class="dot hidden"></div><div class="dot hidden"></div>
                </div>
            </div>
            
            <button id="main-roll-btn" class="roll-btn" onclick="performUserRoll()">ROLL DICE</button>
            
            <button class="admin-toggle" onclick="toggleAdmin()">Admin Controls</button>
            <div id="admin-dashboard">
                <h4 style="margin-top:0; color:#38bdf8;">Admin Controls</h4>
                <button class="admin-btn" onclick="adminResetGame()">Reset Game</button>
                <button class="admin-btn" onclick="adminKickAll()">Kick All</button>
                <button class="admin-btn" onclick="adminCloseRoom()">Close Room</button>
                <div style="margin-top:10px;">
                    <label style="font-size:12px; font-weight:bold; cursor:pointer;">
                        <input type="checkbox" id="admin-dice-toggle" onchange="toggleAdminDice()"> Enable Admin Dice Control
                    </label>
                </div>
                <div id="admin-dice-panel">
                    <p style="font-size:12px; margin:0 0 5px; font-weight:bold;">Force Roll For Current Player:</p>
                    <button class="admin-dice-btn" onclick="adminForceRoll(1)">1</button>
                    <button class="admin-dice-btn" onclick="adminForceRoll(2)">2</button>
                    <button class="admin-dice-btn" onclick="adminForceRoll(3)">3</button>
                    <button class="admin-dice-btn" onclick="adminForceRoll(4)">4</button>
                    <button class="admin-dice-btn" onclick="adminForceRoll(5)">5</button>
                    <button class="admin-dice-btn" onclick="adminForceRoll(6)">6</button>
                </div>
            </div>
        </div>

        <div id="chat-panel">
            <div id="chat-header">
                <span style="font-size:12px; font-weight:800; color:#94a3b8;">ROOM CHAT</span>
                <button id="mute-btn" onclick="toggleMute()" style="background:none; border:none; cursor:pointer; font-size:18px;" title="Toggle Sounds">🔊</button>
            </div>
            <div id="chat-messages"></div>
            <div id="emoji-bar">
                <span class="emoji" onclick="sendQuickEmoji('👍')">👍</span>
                <span class="emoji" onclick="sendQuickEmoji('😂')">😂</span>
                <span class="emoji" onclick="sendQuickEmoji('🔥')">🔥</span>
                <span class="emoji" onclick="sendQuickEmoji('😡')">😡</span>
                <span class="emoji" onclick="sendQuickEmoji('❤️')">❤️</span>
            </div>
            <div id="chat-input-area">
                <input type="text" id="chat-input" maxlength="100" placeholder="Type message...">
                <button id="chat-send-btn" onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div>

    <div id="toast"></div>

    <div id="win-modal" class="modal">
        <div id="confetti-container"></div>
        <div class="modal-content">
            <h2 id="winner-text" style="color:#E53935;">Player Wins!</h2>
            <button class="lobby-btn create" onclick="playAgain()">Play Again</button>
            <button class="lobby-btn" style="background:#475569; margin-top:10px;" onclick="location.reload()">Exit Room</button>
        </div>
    </div>

<script>
    // -----------------------------------------
    // GLOBALS & SETUP
    // -----------------------------------------
    let selectedColorIndex = 0;
    document.querySelectorAll('.color-opt').forEach(opt => {
        opt.addEventListener('click', (e) => {
            document.querySelectorAll('.color-opt').forEach(o => o.classList.remove('selected'));
            e.target.classList.add('selected');
            selectedColorIndex = parseInt(e.target.dataset.color);
        });
    });

    const AudioContext = window.AudioContext || window.webkitAudioContext;
    const audioCtx = new AudioContext();
    let isMuted = false;
    let lastNotificationTime = 0;
    let toastTimeout = null;

    let isInitialLoad = true;
    let knownPlayers =[null, null, null, null];

    function initAudio() { if (audioCtx.state === 'suspended') audioCtx.resume(); }
    document.addEventListener('click', initAudio, { once: true });
    document.addEventListener('touchstart', initAudio, { once: true });

    function playSound(type) {
        if (!audioCtx || audioCtx.state === 'suspended' || isMuted) return;
        const now = audioCtx.currentTime;
        if (type === 'roll') {
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination); osc.type = 'triangle';
            osc.frequency.setValueAtTime(400 + Math.random()*200, now);
            gain.gain.setValueAtTime(0.5, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.05);
            osc.start(now); osc.stop(now + 0.05);
        } else if (type === 'move') {
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination); osc.type = 'sine';
            osc.frequency.setValueAtTime(400, now); osc.frequency.exponentialRampToValueAtTime(800, now + 0.1);
            gain.gain.setValueAtTime(0.2, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
            osc.start(now); osc.stop(now + 0.1);
        } else if (type === 'capture') {
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination); osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(300, now); osc.frequency.exponentialRampToValueAtTime(50, now + 0.3);
            gain.gain.setValueAtTime(0.3, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
            osc.start(now); osc.stop(now + 0.3);
        } else if (type === 'win') {[440, 554, 659].forEach((freq, i) => {

            rollBtn.disabled = (!isMyTurn || adminDiceControl); 
            dice.style.borderColor = COLORS[currentTurn];
            
            if (GAME_STATE === 'WAITING_MOVE') {
                if (isMyTurn) { msg.innerText = "Select piece to move"; msg.style.color = COLORS[currentTurn]; let moves = getLegalMoves(currentTurn, diceValue); moves.forEach(tIndex => { let el = document.getElementById(`token-${currentTurn}-${tIndex}`); if(el) el.classList.add('highlight'); }); } 
                else { msg.innerText = `${players[currentTurn].name}'s Turn`; msg.style.color = "#94a3b8"; }
            } else {
                if (isMyTurn) { 
                    msg.innerText = adminDiceControl ? "Waiting for Admin roll" : "Your Turn! Roll Dice"; 
                    msg.style.color = COLORS[currentTurn]; 
                } else { msg.innerText = `Waiting for ${players[currentTurn].name}`; msg.style.color = "#94a3b8"; }
            }
        }
    }

    // -----------------------------------------
    // LOGIC & ACTIONS
    // -----------------------------------------
    function performUserRoll() {
        if (!gameStarted || GAME_STATE !== 'WAITING_ROLL' || players[currentTurn].isRobot) return;
        if (myPlayerIndex !== currentTurn) return showToast("It's not your turn!", true);
        if (adminDiceControl) return showToast("Admin is controlling the dice!", true);
        executeRollSync(Math.floor(Math.random() * 6) + 1);
    }
    
    function adminForceRoll(val) {
        if (!isAdmin || !adminDiceControl) return;
        if (!gameStarted || GAME_STATE !== 'WAITING_ROLL') return showToast("Wait for movement to finish.", true);
        executeRollSync(val);
    }

    function forceRoll() {
        // Backup direct admin force regardless of toggle
        if (!isAdmin) return;
        if (!gameStarted || GAME_STATE !== 'WAITING_ROLL') return showToast("Wait for movement to finish.", true);
        let val = parseInt(document.getElementById('admin-dice').value, 10);
        if (!val || val < 1 || val > 6) return alert("Enter 1-6");
        document.getElementById('admin-dice').value = ''; executeRollSync(val);
    }

    function executeRollSync(val) {
        let moves = getLegalMoves(currentTurn, val); localRollCount++; 
        let nextSixCount = consecutiveSixCount;
        
        if (val === 6) {
            nextSixCount++;
            if (nextSixCount === 3) {
                let nextTurn = currentTurn; do { nextTurn = (nextTurn + 1) % 4; } while (!players[nextTurn].active);
                db.ref('rooms/' + currentRoomId).update({ diceValue: val, rollCount: localRollCount, currentTurn: nextTurn, gameState: 'WAITING_ROLL', consecutiveSixCount: 0, skipReason: '3_SIXES', turnDeadline: Date.now() + serverTimeOffset + turnTimeLength }); return;
            }
        } else { nextSixCount = 0; }

        if (moves.length === 0) {
            let nextTurn = currentTurn; do { nextTurn = (nextTurn + 1) % 4; } while (!players[nextTurn].active);
            db.ref('rooms/' + currentRoomId).update({ diceValue: val, rollCount: localRollCount, currentTurn: nextTurn, gameState: 'WAITING_ROLL', consecutiveSixCount: 0, turnDeadline: Date.now() + serverTimeOffset + turnTimeLength });
        } else {
            db.ref('rooms/' + currentRoomId).update({ diceValue: val, rollCount: localRollCount, gameState: 'WAITING_MOVE', consecutiveSixCount: nextSixCount, turnDeadline: Date.now() + serverTimeOffset + turnTimeLength });
        }
    }
    function getLegalMoves(pIndex, dice) {
        let moves =[]; if (!players || !players[pIndex]) return moves;
        players[pIndex].tokens.forEach((pos, tIndex) => { if (pos === -1 && dice === 6) moves.push(tIndex); if (pos >= 0 && pos + dice <= 56) moves.push(tIndex); }); return moves;
    }
    function handleTokenClick(pIndex, tIndex) {
        if (!gameStarted || GAME_STATE !== 'WAITING_MOVE' || isSyncing || players[currentTurn].isRobot) return;
        if (pIndex !== currentTurn) return;
        if (myPlayerIndex !== currentTurn) return showToast("It's not your turn!", true);
        let moves = getLegalMoves(pIndex, diceValue); if (!moves.includes(tIndex)) return;
        calculateAndSyncMove(pIndex, tIndex);
    }
    function calculateAndSyncMove(pIndex, tIndex) {
        let newPlayers = JSON.parse(JSON.stringify(players)); 
        let startPos = parseInt(newPlayers[pIndex].tokens[tIndex], 10);
        let dVal = parseInt(diceValue, 10);

        if (startPos === -1) newPlayers[pIndex].tokens[tIndex] = 0; 
        else newPlayers[pIndex].tokens[tIndex] += dVal;
        
        // Failsafe bounds check
        if (newPlayers[pIndex].tokens[tIndex] > 56) newPlayers[pIndex].tokens[tIndex] = 56;

        let pos = newPlayers[pIndex].tokens[tIndex]; let getsBonusTurn = (dVal === 6);

        if (pos >= 0 && pos < 51) {
            let absTrack = (pos + START_OFFSETS[pIndex]) % 52;
            if (!SAFE_ZONES.includes(absTrack)) {
                for (let i = 0; i < 4; i++) {
                    if (i !== pIndex && newPlayers[i].active) {
                        for (let j = 0; j < 4; j++) {
                            let otPos = parseInt(newPlayers[i].tokens[j], 10);
                            if (otPos >= 0 && otPos < 51 && absTrack === ((otPos + START_OFFSETS[i]) % 52)) { newPlayers[i].tokens[j] = -1; getsBonusTurn = true; }
                        }
                    }
                }
            }
        }
        if (pos === 56) getsBonusTurn = true; 
        
        let isWin = newPlayers[pIndex].tokens.every(p => parseInt(p, 10) === 56);
        if (isWin) {
            newPlayers[pIndex].score = (newPlayers[pIndex].score || 0) + 1;
            db.ref('rooms/' + currentRoomId).update({ players: newPlayers, gameState: 'GAME_OVER', winnerIndex: pIndex }); return;
        }

        let nextTurn = currentTurn; let nextSixCount = consecutiveSixCount;
        if (!getsBonusTurn) { do { nextTurn = (nextTurn + 1) % 4; } while (!newPlayers[nextTurn].active); nextSixCount = 0; }
        db.ref('rooms/' + currentRoomId).update({ players: newPlayers, currentTurn: nextTurn, gameState: 'WAITING_ROLL', consecutiveSixCount: nextSixCount, turnDeadline: Date.now() + serverTimeOffset + turnTimeLength });
    }
    function robotPlay(moves) {
        let chosenToken = -1;
        for (let t of moves) { if (simulatesCapture(currentTurn, t, diceValue)) { chosenToken = t; break; } }
        if (chosenToken === -1 && diceValue === 6) { for (let t of moves) { if (players[currentTurn].tokens[t] === -1) { chosenToken = t; break; } } }
        if (chosenToken === -1) { let maxPos = -99; for (let t of moves) { let pos = parseInt(players[currentTurn].tokens[t], 10); if (pos > maxPos) { maxPos = pos; chosenToken = t; } } }
        if (chosenToken !== -1) calculateAndSyncMove(currentTurn, chosenToken);
    }
    function simulatesCapture(pIndex, tIndex, dice) {
        let pos = parseInt(players[pIndex].tokens[tIndex], 10); if (pos === -1) return false; let newPos = pos + parseInt(dice, 10); if (newPos >= 51) return false; 
        let absTrack = (newPos + START_OFFSETS[pIndex]) % 52; if (SAFE_ZONES.includes(absTrack)) return false;
        for (let i = 0; i < 4; i++) { if (i !== pIndex && players[i].active) { for (let j = 0; j < 4; j++) { let otPos = parseInt(players[i].tokens[j], 10); if (otPos >= 0 && otPos < 51 && absTrack === ((otPos + START_OFFSETS[i]) % 52)) return true; } } } return false;
    }

    function playAgain() {
        let newPlayers = JSON.parse(JSON.stringify(players));
        newPlayers.forEach(p => { p.tokens =[-1,-1,-1,-1]; });
        let nextTurn = 0; do { nextTurn = (nextTurn + 1) % 4; } while (!newPlayers[nextTurn].active);
        db.ref('rooms/' + currentRoomId).update({ players: newPlayers, gameState: 'WAITING_ROLL', currentTurn: nextTurn, consecutiveSixCount: 0, turnDeadline: Date.now() + serverTimeOffset + turnTimeLength, rollCount: localRollCount + 1, winnerIndex: null });
    }

    // -----------------------------------------
    // CHAT & ADMIN
    // -----------------------------------------
    function toggleMute() { isMuted = !isMuted; document.getElementById('mute-btn').innerText = isMuted ? '🔇' : '🔊'; }
    function sendMessage() {
        if (!currentRoomId) return; let input = document.getElementById('chat-input'); let text = input.value.trim();
        if (!text) return; if (text.length > 100) text = text.substring(0, 100);
        db.ref('rooms/' + currentRoomId + '/messages').push({ playerIndex: myPlayerIndex, text: text, timestamp: Date.now() }); input.value = '';
    }
    function sendQuickEmoji(emoji) {
        if (!currentRoomId || myPlayerIndex === -1) return;
        db.ref('rooms/' + currentRoomId + '/messages').push({ playerIndex: myPlayerIndex, text: emoji, timestamp: Date.now() });
    }
    document.getElementById('chat-input').addEventListener('keypress', function(e) { if (e.key === 'Enter') sendMessage(); });
    
    function displayChatMessage(msg, isNew = true) {
        let container = document.getElementById('chat-messages'); let div = document.createElement('div'); div.className = 'chat-msg';
        let sName = (msg.playerIndex >= 0 && msg.playerIndex < 4) ? (players[msg.playerIndex] ? players[msg.playerIndex].name : PLAYER_NAMES[msg.playerIndex]) : 'Spectator';
        let color = (msg.playerIndex >= 0 && msg.playerIndex < 4) ? COLORS[msg.playerIndex] : '#94a3b8';
        if (msg.playerIndex === myPlayerIndex) sName += " (You)";
        div.innerHTML = `<div class="chat-sender" style="color:${color}">${sName}</div><div>${msg.text}</div>`;
        if (isNew) { div.classList.add('new-msg'); if (msg.playerIndex !== myPlayerIndex) playSound('notification'); }
        container.appendChild(div); container.scrollTop = container.scrollHeight;
    }

    function toggleAdmin() {
        if (!adminMode) {
            let pwd = prompt("Enter Admin Password:");
            if (pwd === null) return;
            db.ref('settings/adminPassword').once('value').then(snap => {
                let actualPwd = snap.val();
                if (!actualPwd) { db.ref('settings/adminPassword').set('anvi123'); actualPwd = 'anvi123'; }
                if (pwd.trim() === actualPwd) { 
                    adminMode = true; isAdmin = true; 
                    document.getElementById('admin-dashboard').style.display = 'block'; 
                    document.getElementById('admin-dice-toggle').checked = adminDiceControl;
                    document.getElementById('admin-dice-panel').style.display = adminDiceControl ? 'block' : 'none';
                    showToast("Admin Mode Enabled");
                } 
                else { alert("Incorrect Password!"); }
            });
        } else { adminMode = false; isAdmin = false; document.getElementById('admin-dashboard').style.display = 'none'; showToast("Admin Mode Disabled"); }
    }

    function adminResetGame() {
        if (!isAdmin || !currentRoomId) return;
        if(confirm("Are you sure you want to reset the game for everyone?")) playAgain();
    }

    function adminKickAll() {
        if (!isAdmin || !currentRoomId) return;
        if(confirm("Kick all players?")) {
            let newPlayers = JSON.parse(JSON.stringify(players));
            newPlayers.forEach(p => { if (!p.isRobot) { p.userId = null; p.name = "Waiting..."; p.tokens=[-1,-1,-1,-1]; p.score=0; } });
            db.ref('rooms/' + currentRoomId).update({ players: newPlayers, gameStarted: false });
        }
    }

    function adminCloseRoom() {
        if (!isAdmin || !currentRoomId) return;
        if(confirm("Close room? Everyone will be disconnected.")) {
            db.ref('rooms/' + currentRoomId).remove().then(() => location.reload());
        }
    }

    function toggleAdminDice() {
        if (!isAdmin || !currentRoomId) return;
        let isChecked = document.getElementById('admin-dice-toggle').checked;
        db.ref('rooms/' + currentRoomId).update({ adminDiceControl: isChecked });
    }

    function createConfetti() {
        document.getElementById('confetti-container').innerHTML = '';
        const colors =['#f00', '#0f0', '#00f', '#ff0', '#f0f', '#0ff'];
        for(let i=0; i<60; i++) {
            let conf = document.createElement('div'); conf.className = 'confetti';
            conf.style.left = Math.random() * 100 + 'vw'; conf.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            conf.style.animationDuration = (Math.random() * 2 + 2) + 's'; document.getElementById('confetti-container').appendChild(conf);
        }
    }
</script>
